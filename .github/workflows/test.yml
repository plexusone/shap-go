name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -v -race ./...

  equivalence:
    name: TreeSHAP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run TreeSHAP equivalence tests
        run: go test -v ./explainer/tree/... -run TestAgainstPythonSHAP

      - name: Verify local accuracy property
        run: go test -v ./explainer/tree/... -run TestLocalAccuracyProperty

      - name: Run all tree tests
        run: go test -v ./explainer/tree/...

  # Job to verify the committed test data is valid JSON
  verify-testdata:
    name: Verify Test Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate test data JSON
        run: |
          python3 -c "
          import json
          with open('testdata/treeshap_test_cases.json') as f:
              data = json.load(f)
          print('Test data is valid JSON')
          print('Version:', data.get('version'))
          print('Test suites:', [s['name'] for s in data.get('test_suites', [])])
          print('Total cases:', sum(len(s['cases']) for s in data.get('test_suites', [])))
          "
